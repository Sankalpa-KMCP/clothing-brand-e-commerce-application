version: '3.8'

services:
  postgres-staging:
    image: postgres:15-alpine
    container_name: ecommerce_postgres_staging
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres_staging_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_to_a_secure_staging_password_12345}
      POSTGRES_DB: ${DB_NAME:-ecommerce_staging_db}
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres_staging_user} -d $${POSTGRES_DB:-ecommerce_staging_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - staging-net
    restart: unless-stopped

  db-migration:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_db_migration_staging
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_MAIN_WEB_APPLICATION_TYPE: "none"
      DB_HOST: postgres-staging
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ecommerce_staging_db}
      DB_USERNAME: ${DB_USERNAME:-postgres_staging_user}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_to_a_secure_staging_password_12345}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_secure_staging_jwt_secret_key_at_least_32_characters_long}
      AUTH_RATE_LIMIT_HASH_SECRET: ${AUTH_RATE_LIMIT_HASH_SECRET:-change_me_to_a_secure_staging_rate_limit_hash_secret_value}
      app.security.metrics.token: ${METRICS_SECURITY_TOKEN:-change_me_to_a_secure_staging_metrics_scraping_token_at_least_16_chars}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://staging.example.com}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      UPLOAD_BASE_URL: ${UPLOAD_BASE_URL:-https://staging.example.com/api/images/}
      # Ensure optional features remain disabled
      EMAIL_ENABLED: "false"
      STRIPE_ENABLED: "false"
      MIGRATION_LOCAL_TO_S3_ENABLED: "false"
    depends_on:
      postgres-staging:
        condition: service_healthy
    networks:
      - staging-net
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_backend_staging
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_FLYWAY_ENABLED: "false"
      DB_HOST: postgres-staging
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ecommerce_staging_db}
      DB_USERNAME: ${DB_USERNAME:-postgres_staging_user}
      DB_PASSWORD: ${DB_PASSWORD:-change_me_to_a_secure_staging_password_12345}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_secure_staging_jwt_secret_key_at_least_32_characters_long}
      AUTH_RATE_LIMIT_HASH_SECRET: ${AUTH_RATE_LIMIT_HASH_SECRET:-change_me_to_a_secure_staging_rate_limit_hash_secret_value}
      app.security.metrics.token: ${METRICS_SECURITY_TOKEN:-change_me_to_a_secure_staging_metrics_scraping_token_at_least_16_chars}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://staging.example.com}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      UPLOAD_BASE_URL: ${UPLOAD_BASE_URL:-https://staging.example.com/api/images/}
      # Staging trust model configurations
      app.auth-rate-limit.trust-forwarded-for: "true"
      # Ensure optional features remain disabled
      EMAIL_ENABLED: "false"
      STRIPE_ENABLED: "false"
      MIGRATION_LOCAL_TO_S3_ENABLED: "false"
    depends_on:
      postgres-staging:
        condition: service_healthy
      db-migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - staging-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_STRIPE_CHECKOUT_ENABLED: ${VITE_STRIPE_CHECKOUT_ENABLED:-false}
    container_name: ecommerce_frontend_staging
    ports:
      - "${STAGING_HTTP_PORT:-80}:80"
    volumes:
      - ./frontend/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - staging-net
    restart: unless-stopped

volumes:
  pgdata_staging:

networks:
  staging-net:
