server {
    listen 80;
    server_name localhost;

    # Global security headers (applied to standard requests)
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Do not cache index.html to ensure users always get the latest deployment assets
    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        
        # Duplicate security headers since Nginx add_header is not inherited if defined locally
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'self'; frame-ancestors 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Cache static assets securely
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2)$ {
        root /usr/share/nginx/html;
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
        
        # Duplicate relevant asset security headers
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Expose only public health/info actuator endpoints
    location ~ ^/actuator/(health|info) {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        
        # Strip client-supplied proxy headers and overwrite with trusted proxy values
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Pass headers like Authorization, Content-Type, and X-Correlation-ID
        proxy_pass_request_headers on;
    }

    # Block public access to prometheus scraping and any other actuator endpoints
    location /actuator {
        deny all;
        return 403;
    }

    # Route Stripe webhook traffic ONLY to the exact Stripe webhook endpoint
    location = /api/webhooks/stripe {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        
        # Strip client-supplied proxy headers and overwrite with trusted values
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_pass_request_headers on;
    }

    # Deny access to any other subpaths under /api/webhooks/
    location /api/webhooks/ {
        deny all;
        return 403;
    }

    # Route all other API traffic
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        
        # Strip client-supplied proxy headers and overwrite with trusted values
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        proxy_pass_request_headers on;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
