name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: devpassword123
          POSTGRES_DB: ecommerce_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ecommerce_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test Backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: ecommerce_db
          DB_USERNAME: postgres
          DB_PASSWORD: devpassword123
          JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean test

      - name: Start Backend for E2E Tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: ecommerce_db
          DB_USERNAME: postgres
          DB_PASSWORD: devpassword123
          JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          ADMIN_BOOTSTRAP_ENABLED: true
          ADMIN_EMAIL: admin@example.com
          ADMIN_PASSWORD: Password123!
        run: |
          cd backend
          nohup ./mvnw spring-boot:run > backend.log 2>&1 &
          echo "Waiting for backend actuator health check to be UP..."
          for i in {1..30}; do
            if curl -s http://localhost:8080/actuator/health | grep -q '"status":"UP"'; then
              echo "Backend is healthy!"
              break
            fi
            sleep 2
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint and Build Frontend
        run: |
          cd frontend
          npm run lint
          npm run build

      - name: Install Playwright Browsers
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E Tests
        env:
          E2E_ADMIN_EMAIL: admin@example.com
          E2E_ADMIN_PASSWORD: Password123!
          VITE_STRIPE_CHECKOUT_ENABLED: false
        run: |
          cd frontend
          npx playwright test

      - name: Upload Playwright Report on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Print Backend Logs on Failure
        if: failure()
        run: |
          if [ -f backend/backend.log ]; then
            cat backend/backend.log
          fi

  container-build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Backend Docker Image
        run: |
          docker build -t ecommerce-backend:latest ./backend

      - name: Build Frontend Docker Image
        run: |
          docker build -t ecommerce-frontend:latest ./frontend
