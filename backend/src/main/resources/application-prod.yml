spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
      group:
        liveness:
          include: ping
        readiness:
          include: db

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  upload:
    dir: ${UPLOAD_DIR}
    base-url: ${UPLOAD_BASE_URL}

